<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo de Dominó</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<h1>Jogo de Dominó</h1>
<div class="game-container">
    <div class="computer-hand">
        <h2>Mão do Computador</h2>
        <div id="computer-hand"></div>
    </div>
    <div class="board">
        <h2>Tabuleiro</h2>
        <div id="board"></div>
    </div>
    <div class="player-hand">
        <h2>Sua Mão</h2>
        <div id="player-hand"></div>
    </div>
</div>
<button id="start-game">Iniciar Jogo</button>
<script src="js/script.js"></script>
</body>
</html>
